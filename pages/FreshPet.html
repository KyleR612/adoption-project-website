<!DOCTYPE html>
<html>
    <head>
        <title>Donate</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="../pages/adopt.css">
    </head>
    <body>
        <h1 class="adopt1">Donations</h1>
        <div class="dropdown">
        <button class="dropbtn"><img src="../images/button.png" width="30px" height="30px"></button>
        <div id="myDropdown" class="dropdown-content">
        <a href="../index.html">Home</a>
        <a href="../pages/Help the Animals.html">Help the Animals</a>
        <a href="../pages/Contact.html">Contact</a>
        <a href="../pages/Information Center.html">Info</a>
        <a href="../pages/donate.html">Donate</a>
        </div>
        </div>
        <br>
        <img src="../images/food.webp" id="FreshPet" width="300" height="400">
        <br>
        <p>Choose the quantity you would like to donate for this item.</p>
        <br>
        <div class="button-Dropdown">
        <button onclick="toggleButton()" class="dropbuttons"><img src="../images/dropdown.webp" width="30px" height="30px">Select a Quantity</button>
        <div id="myDropdownButton" class="button-Dropdown-content">
            <a href="#">1</a>
            <a href="#">2</a>
            <a href="#">3</a>
            <a href="#">4</a>
            <a href="#">5</a>
            <a href="#">6</a>
            <a href="#">7</a>
            <a href="#">8</a>
            <a href="#">9</a>
            <a href="#">10</a>
        </div>
        </div>
        <script>
            function toggleButton() {
                document.getElementById("myDropdownButton").classList.toggle("show");
            }

            window.onClick = function(event) {
                if (!event.target.matches('.dropbuttons')) {
                    let dropdowns = document.getElementsByClassName("button-Dropdown-content");
                    for (let i = 0; i < dropdowns.length; i++) {
                        let openDropdown = dropdowns[i];
                        if (openDropdown.classList.contains('show')) {
                            openDropdown.classList.remove('show');
                        }
                    }
                }
            }
        </script>
        <footer>Copyright &copy; Kyle Radant</footer>
    </body>
</html>
