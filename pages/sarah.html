    </head>
    <y>
        <h1>Sarah</h1>
        <div class="dropdown">
        <button class="dropbtn"><img src="../images/button.png" width="30px" height="30px"></button>
        <div id="myDropdown" class="dropdown-content">
        <a href="../index.html">Home</a>
        <a href="../pages/Help the Animals.html">Help the Animals</a>

        <a href="../pages/donate.html">Donate</a>
        </div>
        </div>
        <img src="../images/sarah.jpg" width="380" height="350" style="margin-top: 20px;">
        <h2>If you would like to adopt Sarah please fill out the form below ⬇️</h2>
        <form class="adoption-form" action="#" method="post">
            <label for="name">Full Name:</label><br>
            <input type="text" id="name" name="name" required><br><br>
            
            <label for="email">Email:</label><br>
            <input type="email" id="email" name="email" required><br><br>
            
            <label for="phone">Phone Number:</label><br>
            <input type="tel" id="phone" name="phone"><br><br>
            
            <label for="address">Address:</label><br>
            <textarea id="address" name="address" rows="3"></textarea><br><br>
            
            <label for="reason">Why do you want to adopt Sarah?</label><br>
            <textarea id="reason" name="reason" rows="4"></textarea><br><br>
            
            <label for="experience">Do you have experience with cats? Please describe:</label><br>
            <textarea id="experience" name="experience" rows="4"></textarea><br><br>
            
            <label for="home">Type of home:</label><br>
            <select id="home" name="home">
                <option value="house">House</option>
                <option value="apartment">Apartment</option>
                <option value="condo">Condo</option>
                <option value="other">Other</option>
            </select><br><br>
            
            <label for="otherpets">Do you have other pets?</label><br>
            <input type="radio" id="yes" name="otherpets" value="yes">
            <label for="yes">Yes</label>
            <input type="radio" id="no" name="otherpets" value="no">
            <label for="no">No</label><br><br>
            
            <label for="references">Please provide references (e.g., vet, previous pet owners):</label><br>
            <textarea id="references" name="references" rows="3"></textarea><br><br>
            
            <input type="submit" value="Submit Adoption Application">
            <div id="popupOverlay" class="overlay">
            <div class="popup">
                <h2>Thank you for your application!</h2>
                <p>We will review your application and get back to you soon.</p>
                <button id="closePopup">Close</button>
            </div>
        </div>
        <script>
            document.addEventListener('DOMContentLoaded', function() {
                const form = document.querySelector('.adoption-form');
                const popupOverlay = document.getElementById('popupOverlay');
                const closePopup = document.getElementById('closePopup');

                form.addEventListener('submit', function(event) {
                    event.preventDefault(); // Prevent actual form submission
                    popupOverlay.classList.add('active');
                });

                closePopup.addEventListener('click', function() {
                    popupOverlay.classList.remove('active');
                });

                // Optional: Close popup when clicking outside
                popupOverlay.addEventListener('click', function(event) {
                    if (event.target === popupOverlay) {
                        popupOverlay.classList.remove('active');
                    }
                });
            });
        </script>
        </form>
