<!DOCTYPE html>
<html>
    <head>
        <title>Dog Blanket</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="icon" href="../images/icon.png" type="image/png">
        <link rel="stylesheet" href="../pages/adopt.css">
    </head>
    <body>
        <div class="content">
        <h1 class="adopt1">Donations</h1>
        <div class="dropdown">
        <button class="dropbtn"><img src="../images/button.png" width="30px" height="30px"></button>
        <div id="myDropdown" class="dropdown-content">
        <a href="../index.html">Home</a>
        <a href="../pages/Help the Animals.html">Help the Animals</a>
        <a href="../pages/Contact.html">Contact</a>
        <a href="../pages/Information Center.html">Information Center</a>
        <a href="../pages/donate.html">Donate</a>
        </div>
        </div>
        <br>
        <div style="clear: both;"></div>
        <a href="../pages/donate.html" class="back-button">← Back to Donations</a>
        <img src="../images/dog blanket1.webp" id="General" width="390" height="400">
        <br>
        <p>Choose the quantity you would like to donate for this item.</p>
        <br>
        <div class="quantity-selector">
            <button onclick="decreaseQuantity()" class="qty-btn">−</button>
            <span id="quantityDisplay" class="qty-display">1</span>
            <button onclick="increaseQuantity()" class="qty-btn">+</button>
            <br><br>
            <button onclick="confirmQuantity()" class="confirm-btn">Confirm</button>
        </div>
        <div id="donationPopup" class="overlay">
            <div class="popup">
                <h2>Thank you for your donation!</h2>
                <p>The next page will show you what you donated!</p>
                <button id="closePopup">Next</button>
            </div>
        </div>
        <script>
            let quantity = 1;
            const itemName = "Dog Blanket";
            
            function decreaseQuantity() {
                if (quantity > 1) {
                    quantity--;
                    document.getElementById("quantityDisplay").textContent = quantity;
                }
            }
            
            function increaseQuantity() {
                quantity++;
                document.getElementById("quantityDisplay").textContent = quantity;
            }
            
            function confirmQuantity() {
                document.getElementById("donationPopup").classList.add("active");
            }

            document.addEventListener('DOMContentLoaded', function() {
                const closePopup = document.getElementById('closePopup');
                const donationPopup = document.getElementById('donationPopup');

                closePopup.addEventListener('click', function() {
                    donationPopup.classList.remove('active');
                    // Redirect to receipt page
                    window.location.href = "./receipt.html?item=" + encodeURIComponent(itemName) + "&quantity=" + quantity;
                });

                donationPopup.addEventListener('click', function(event) {
                    if (event.target === donationPopup) {
                        donationPopup.classList.remove('active');
                        window.location.href = "./receipt.html?item=" + encodeURIComponent(itemName) + "&quantity=" + quantity;
                    }
                });
            });
        </script>
        </div>
        <footer>Copyright &copy; Kyle Radant</footer>
        <a href="../index.html" class="home-button">Back To Home</a>
    </body>
</html>
